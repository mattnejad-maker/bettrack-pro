var BOOKS=["DraftKings","FanDuel","BetMGM","Caesars","PointsBet","BetRivers","Bet365","Other"];
var SEMOJI={NBA:"&#127936;",NFL:"&#127944;",MLB:"&#9918;",NHL:"&#127944;",EPL:"&#9917;","Champions League":"&#9917;","La Liga":"&#9917;",MLS:"&#9917;",MMA:"&#129354;",NCAAB:"&#127936;",NCAAF:"&#127944;",Other:"&#127922;"};

var S={view:"dashboard",bets:lsGet("btp_b9",[]),cfg:lsGet("btp_c9",{oddsKey:"",tgToken:"",tgChatId:""}),ana:lsGet("btp_a9",null),liveMap:{},polling:false,pickSports:["NBA","NFL","MLB","NHL","EPL"],picks:[],picksLoading:false,picksLastRun:null,form:{sport:"NBA",teams:"",betType:"Spread",betDetail:"",stake:"",odds:"",potentialPayout:"",gameDate:todayStr(),bookmaker:"",notes:""},ocring:false,ocrHit:null,histFilter:"all",anaLoading:false,stTesting:false,confirmReset:false,openCards:{}};

function lsGet(k,fb){try{var r=localStorage.getItem(k);return r?JSON.parse(r):fb}catch(e){return fb}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function todayStr(){return new Date().toISOString().slice(0,10)}
function dayOf(t){return new Date(t).toISOString().slice(0,10)}
function fmtDate(t){return new Date(t).toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function fmtTime(t){return new Date(t).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}
function dollar(n){return"$"+Math.abs(parseFloat(n||0)).toFixed(2)}
function signed(n){var v=parseFloat(n||0);return(v>=0?"+":"\u2212")+dollar(Math.abs(v))}
function pct(n){return(parseFloat(n||0)*100).toFixed(1)+"%"}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function safeJSON(s){try{return JSON.parse((s||"").replace(/```json/g,"").replace(/```/g,"").trim())}catch(e){return null}}
function profC(v){return parseFloat(v)>=0?"var(--grn)":"var(--red)"}
function riskC(r){return r==="Low"?"var(--grn)":r==="High"?"var(--red)":"var(--yel)"}
function prob0(o){var n=parseInt(o,10);if(isNaN(n))return .5;return n<0?Math.abs(n)/(Math.abs(n)+100):100/(n+100)}
function calcProb(bet,score,odds){
  if(odds)return prob0(odds);
  if(!score)return null;
  var bm=(bet.betDetail||"").match(/([+-]?\d+\.?\d*)/);
  var sp=parseFloat(bm&&bm[1]?bm[1]:0)||0;
  return 1/(1+Math.exp(-(score.home-score.away+sp)/4));
}
function merge(a,b){var o={};for(var k in a)if(a.hasOwnProperty(k))o[k]=a[k];for(var k in b)if(b.hasOwnProperty(k))o[k]=b[k];return o}

function badgeH(status){

}

  return null;
}

}

function pollLive(){
  if(!S.cfg.oddsKey)return;
  var active=S.bets.filter(function(b){return b.status===ST.PENDING||b.status===ST.LIVE});
  if(!active.length)return;
  S.polling=true;document.getElementById("live-pill").style.display="";
  var chain=Promise.resolve();
  active.forEach(function(bet){
    chain=chain.then(function(){
      var sk=SPORT_KEYS[bet.sport];if(!sk)return;
      return Promise.all([fetchScores(S.cfg.oddsKey,sk),fetchOdds(S.cfg.oddsKey,sk)]).then(function(res){
        var game=findGame(res[0],bet.teams),og=findGame(res[1],bet.teams);
        var score=game?parseScore(game):null,lo=getLiveOdds(og),prob=calcProb(bet,score,lo);
        S.liveMap[bet.id]={score:score,prob:prob,lo:lo,ts:Date.now()};
        if(score&&score.completed){
          var won=prob!==null?prob>.5:null;
          if(won!==null){
            var ns=won?ST.WON:ST.LOST,payout=won?bet.potentialPayout:0;
            S.bets=S.bets.map(function(b){return b.id===bet.id?merge(b,{status:ns,actualPayout:payout}):b});
            lsSet(SK.BETS,S.bets);
            tgSend((won?"WIN":"LOSS")+" - "+bet.teams+"\n"+(won?"Profit: +"+dollar(payout-bet.stake):"Loss: "+dollar(bet.stake)));
            toast((won?"Won: ":"Lost: ")+bet.teams);
          }
        }else if(score){
          var prev=prevSc[bet.id];
          if((!prev||prev.home!==score.home||prev.away!==score.away)&&(score.home+score.away)>0){
            prevSc[bet.id]=score;
            tgSend("LIVE - "+score.awayTeam+" "+score.away+" - "+score.homeTeam+" "+score.home+"\nBet: "+bet.betType+" "+bet.betDetail+"\nWin prob: "+(prob!==null?Math.round(prob*100)+"%":"--")+" - To win: "+dollar(bet.potentialPayout));
          }
        }
      }).catch(function(){});
    });
  });
  chain.then(function(){S.polling=false;document.getElementById("live-pill").style.display="none";if(S.view==="dashboard")renderPage()});
}

  var fids=["sport","betType","betDetail","teams","stake","odds","pot","date","book","notes"];

window.tog=function(id){S.openCards[id]=!S.openCards[id];renderPage()};
window.settle=function(id,status){
  S.bets=S.bets.map(function(b){if(b.id!==id)return b;var payout=status===ST.WON?b.potentialPayout:status===ST.PUSH?b.stake:0;tgSend((status===ST.WON?"WIN":status===ST.PUSH?"PUSH":"LOSS")+" - "+b.teams+"\n"+(status===ST.WON?"Profit: +"+dollar(payout-b.stake):"Loss: "+dollar(b.stake)));return merge(b,{status:status,actualPayout:payout})});

};
window.delBet=function(id){if(!confirm("Remove this bet?"))return;S.bets=S.bets.filter(function(b){return b.id!==id});lsSet(SK.BETS,S.bets);toast("Bet removed");renderPage()};

window.runPicks=function(){
  if(!S.cfg.oddsKey)return;
  S.picksLoading=true;S.picks=[];renderPage();
  var games=[],rem=S.pickSports.length;
  if(!rem){S.picksLoading=false;renderPage();return}
  S.pickSports.forEach(function(sport){
    var sk=SPORT_KEYS[sport];
    if(!sk){rem--;if(!rem)finishPicks(games);return}
    fetchOdds(S.cfg.oddsKey,sk).then(function(g){if(Array.isArray(g)){var sl=g.slice(0,6);for(var i=0;i<sl.length;i++){var it=merge(sl[i],{});it.sport=sport;games.push(it)}}rem--;if(!rem)finishPicks(games)});
  });
};
function finishPicks(games){
  var hist=S.bets.filter(function(b){return b.status===ST.WON||b.status===ST.LOST||b.status===ST.PUSH}).slice(0,20);
  getAIPicks(games,hist).then(function(r){S.picks=r||[];S.picksLoading=false;S.picksLastRun=Date.now();renderPage()}).catch(function(){S.picksLoading=false;renderPage()});
}
window.pickAdd=function(i){var s=S.picks[i];if(!s)return;S.form={sport:s.sport,teams:s.teams,betType:s.betType,betDetail:s.pick,stake:"",odds:s.odds,potentialPayout:"",gameDate:todayStr(),bookmaker:s.bookmaker||"",notes:"AI pick EV:"+s.expectedValue};go("add")};

window.handleOCR=function(e){
  var file=e.target.files[0];if(!file)return;
  S.ocring=true;S.ocrHit=null;renderPage();
  var reader=new FileReader();
  reader.onload=function(){
    var b64=reader.result.split(",")[1];
    ocrSlip(b64,file.type).then(function(r){if(r){S.ocrHit=r;var ks=["sport","teams","betType","betDetail","stake","odds","potentialPayout","gameDate","bookmaker"];ks.forEach(function(k){if(r[k])S.form[k]=String(r[k])})}S.ocring=false;renderPage()}).catch(function(){S.ocring=false;renderPage()});
  };
  reader.readAsDataURL(file);
};
window.submitBet=function(){
  var f=S.form;
  if(!f.teams||!f.stake){toast("Teams and stake are required","err");return}
  var bet={id:String(Date.now()),sport:f.sport,teams:f.teams,betType:f.betType,betDetail:f.betDetail,stake:parseFloat(f.stake),odds:f.odds,potentialPayout:parseFloat(f.potentialPayout)||0,gameDate:f.gameDate,bookmaker:f.bookmaker,notes:f.notes,status:ST.PENDING,createdAt:Date.now(),actualPayout:null};
  S.bets.unshift(bet);lsSet(SK.BETS,S.bets);
  tgSend("New Bet: "+bet.sport+" - "+bet.teams+"\n"+bet.betType+": "+bet.betDetail+"\nStake: "+dollar(bet.stake)+" @ "+bet.odds+" to win "+dollar(bet.potentialPayout));
  S.form={sport:"NBA",teams:"",betType:"Spread",betDetail:"",stake:"",odds:"",potentialPayout:"",gameDate:todayStr(),bookmaker:"",notes:""};

};
